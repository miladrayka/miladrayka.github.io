<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Publications | Milad Rayka</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <nav>
        <div class="nav-inner">
            <a href="../index.html" class="nav-logo">AI for Molecular & Materials Science</a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="publications.html" class="active">Publications</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="cv.html">CV</a></li>
                <li><a href="tutorials.html">Tutorials</a></li>
            </ul>
        </div>
    </nav>

    <main class="page">
        <h1>Full Publication List</h1>
        <div id="list" class="pub-container"></div>
    </main>

    <script>
        function parseCSVRow(row) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < row.length; i++) {
                const ch = row[i];
                if (ch === '"') {
                    inQuotes = !inQuotes;
                } else if (ch === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += ch;
                }
            }
            result.push(current.trim());
            return result;
        }

        fetch('../data/citations.csv')
            .then(r => r.text())
            .then(data => {
                const rows = data.split('\n').slice(1).filter(r => r.trim());
                const total = rows.length;
                document.getElementById('list').innerHTML = rows.reverse().map((row, i) => {
                    const p = parseCSVRow(row);
                    if (!p || p.length < 5) return '';
                    return `<div class="pub-card">
                        <span class="pub-year">#${total - i}</span>
                        <span class="pub-year">${p[3]}</span>
                        <h3>${p[1]}</h3>
                        <p class="pub-authors">${p[0]}</p>
                        <p class="pub-journal"><em>${p[2]}</em></p>
                        <a href="${p[4]}" target="_blank" class="tag">↗ Link</a>
                    </div>`;
                }).join('');
            });
    </script>
</body>

</html>
