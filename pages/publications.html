<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Publications | Milad Rayka</title><link rel="stylesheet" href="../assets/css/style.css"></head>
<body>
    
    <nav>
        <div class="nav-inner">
            <a href="../index.html" class="nav-logo">Milad Rayka</a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../pages/publications.html">Publications</a></li>
                <li><a href="../pages/projects.html">Projects</a></li>
                <li><a href="../pages/cv.html">CV</a></li>
                <li><a href="../pages/tutorials.html">Tutorials</a></li>
            </ul>
        </div>
    </nav>
    <main class="page">
        <h1>Full Publication List</h1>
        <div id="list" class="pub-container"></div>
    </main>
    <script>
        fetch('../data/citations.csv').then(r => r.text()).then(data => {
            const rows = data.split('\n').slice(1);
            document.getElementById('list').innerHTML = rows.reverse().map(row => {
                const p = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                if (!p) return '';
                return `<div class="pub-card">
                    <span class="pub-year">${p[3]}</span>
                    <h3>${p[1].replace(/"/g,'')}</h3>
                    <p class="pub-authors">${p[0].replace(/"/g,'')}</p>
                    <p class="pub-journal"><em>${p[2].replace(/"/g,'')}</em></p>
                    <a href="${p[4]}" target="_blank" class="tag">Link / DOI</a>
                </div>`;
            }).join('');
        });
    </script>
</body></html>
